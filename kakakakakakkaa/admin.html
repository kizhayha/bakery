<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    /* Inline styles for image preview */
    #admin-img-preview {
      max-width: 150px;
      border-radius: 10px;
      margin-top: 10px;
      display: none;
      border: 2px solid #ff8fab;
    }
    .file-input-label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: #666;
    }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2><i class="fas fa-lock"></i> Admin Access</h2>
    <input type="password" id="admin-pass" placeholder="Password">
    <button class="btn-main" onclick="checkLogin()">Unlock Dashboard</button>
  </div>
</div>

<header>
  <div class="header-container">
    <a href="#" class="logo-text">C&N <span>Bakery</span> Admin</a>
  </div>
</header>

<div class="container">
  <div class="nav-tabs">
    <div class="tab active" onclick="showSection('orders-sec', this)"><i class="fas fa-shopping-bag"></i> Orders</div>
    <div class="tab" onclick="showSection('products-sec', this)"><i class="fas fa-birthday-cake"></i> Menu</div>
    <div class="tab" onclick="showSection('schedule-sec', this)"><i class="fas fa-calendar-alt"></i> Schedule</div>
  </div>

  <div id="orders-sec" class="section active">
    <div class="orders-layout">
      
      <div class="admin-card">
        <h2 class="column-title" style="color: #e67e22;"><i class="fas fa-pause-circle"></i> Pending Confirmation</h2>
        <div id="pending-orders-list">
          <p style="text-align:center; padding: 20px; color: #999;">Fetching pending orders...</p>
        </div>
      </div>

      <div class="admin-card">
        <h2 class="column-title" style="color: #27ae60;"><i class="fas fa-shipping-fast"></i> Accepted & In-Progress</h2>
        <div id="accepted-orders-list">
          <p style="text-align:center; padding: 20px; color: #999;">Fetching active orders...</p>
        </div>
      </div>

    </div>
  </div>

  <div id="products-sec" class="section">
    <div class="admin-card">
      <h2><i class="fas fa-plus-circle"></i> Add New Product</h2>
      <form id="add-product-form">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
          <input type="text" id="name" required placeholder="Product Name">
          <input type="number" id="price" step="0.01" required placeholder="Price (₱)">
        </div>

        <label class="file-input-label">Product Photo:</label>
        <input type="file" id="image-file" accept="image/*" required onchange="previewProductImage(event)">
        <img id="admin-img-preview" src="" alt="Preview">

        <select id="category" required style="margin-top:15px;">
          <option value="cakes">Cakes</option>
          <option value="pastries">Pastries</option>
          <option value="custom">Custom Cakes</option>
        </select>
        <textarea id="description" rows="3" placeholder="Description"></textarea>
        <button type="submit" id="add-btn" class="btn-main">Add to Menu</button>
      </form>
    </div>
  </div>

  <div id="schedule-sec" class="section">
    <div class="admin-card calendar-card">
      <div class="calendar-header">
        <button class="btn-action" onclick="changeMonth(-1)"><i class="fas fa-chevron-left"></i></button>
        <h2 id="calendar-month-year" style="margin:0;">Month Year</h2>
        <button class="btn-action" onclick="changeMonth(1)"><i class="fas fa-chevron-right"></i></button>
      </div>
      <div class="calendar-grid" id="calendar-grid"></div>
    </div>

    <div class="admin-card">
      <h2><i class="fas fa-clock"></i> Daily Schedule</h2>
      <div id="day-orders-list">
        <p style="color: #999; font-style: italic;">Select a date on the calendar to view bookings.</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, onValue, update, push, set } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
    authDomain: "candn-bakery.firebaseapp.com",
    databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "candn-bakery"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentViewDate = new Date();
  let allOrders = {};
  let productBase64 = "";

  window.checkLogin = () => {
    if(document.getElementById('admin-pass').value === "digitaldealers") {
      document.getElementById('login-overlay').style.display = 'none';
    } else { alert("Access Denied."); }
  };

  window.showSection = (id, el) => {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    el.classList.add('active');
  };

  window.previewProductImage = (event) => {
    const file = event.target.files[0];
    const reader = new FileReader();
    const preview = document.getElementById('admin-img-preview');
    reader.onload = () => {
      productBase64 = reader.result;
      preview.src = reader.result;
      preview.style.display = "block";
    };
    if(file) reader.readAsDataURL(file);
  };

  const addProductForm = document.getElementById('add-product-form');
  addProductForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('add-btn');
    const cat = document.getElementById('category').value;
    btn.innerText = "Uploading...";
    btn.disabled = true;

    const newProduct = {
      name: document.getElementById('name').value,
      price: document.getElementById('price').value,
      image: productBase64,
      description: document.getElementById('description').value,
      createdAt: Date.now()
    };

    try {
      await set(push(ref(db, `products/${cat}`)), newProduct);
      alert("Product added successfully!");
      addProductForm.reset();
      document.getElementById('admin-img-preview').style.display = "none";
    } catch (err) {
      alert("Error adding product: " + err.message);
    } finally {
      btn.innerText = "Add to Menu";
      btn.disabled = false;
    }
  });

  // --- Real-time Orders & Two-Column Sorting ---
  onValue(ref(db, 'orders'), (snapshot) => {
    const rawData = snapshot.val() || {};
    allOrders = {};
    
    Object.keys(rawData).forEach(key => {
        if (rawData[key].createdAt) {
            allOrders[key] = rawData[key];
        }
    });

    const pendingDiv = document.getElementById('pending-orders-list');
    const acceptedDiv = document.getElementById('accepted-orders-list');
    
    pendingDiv.innerHTML = '';
    acceptedDiv.innerHTML = '';

    const sortedOrders = Object.entries(allOrders).reverse();

    if(sortedOrders.length === 0) {
      pendingDiv.innerHTML = `<p style="text-align:center; color:#999;">No pending orders.</p>`;
      acceptedDiv.innerHTML = `<p style="text-align:center; color:#999;">No active orders.</p>`;
      renderCalendar();
      return;
    }

    sortedOrders.forEach(([id, order]) => {
      const status = order.status || 'pending';
      const isCustom = order.items && order.items.some(item => item.category === 'custom');

      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-header">
          <div>
            <strong style="color:var(--primary-dark)">Order #${id.slice(-5)}</strong>
            <p style="font-size:0.75rem; color:#888;">${new Date(order.createdAt).toLocaleString()}</p>
          </div>
          <span class="status-badge status-${status}">${status.replace(/-/g,' ')}</span>
        </div>
        <p style="font-size:0.9rem;"><strong>Customer:</strong> ${order.customerName}</p>
        <p style="font-size:0.8rem; color:#666;">Phone: ${order.phone}</p>
        <p style="font-size:0.8rem; color:#666;">Address: ${order.address}</p>
        <div style="margin: 10px 0; background: #fff; border: 1px solid #f0f0f0; border-radius: 8px; padding: 10px;">
          ${order.items ? order.items.map(i => `<div style="font-size:0.85rem;">${i.quantity}x ${i.name}</div>`).join('') : 'Empty Order'}
          <div style="text-align:right; font-weight:700; color:var(--primary-dark); margin-top:5px;">Total: ₱${order.totalAmount}</div>
        </div>
        <div class="action-group">
          ${status === 'pending' ? 
            `<button class="btn-action primary" onclick="updateStatus('${id}', '${isCustom ? 'downpayment-received' : 'confirmed'}')">Confirm Order</button>` 
            : 
            `<button class="btn-action" onclick="updateStatus('${id}', 'preparing')">Prepare</button>
             <button class="btn-action" onclick="updateStatus('${id}', 'baking')">Bake</button>
             <button class="btn-action" style="background:#6c5ce7; color:white;" onclick="updateStatus('${id}', 'packing')">Pack</button>
             <button class="btn-action" onclick="updateStatus('${id}', 'delivery')">Ship Out</button>`
          }
        </div>`;

      // Sort into correct column
      if (status === 'pending') {
          pendingDiv.appendChild(card);
      } else {
          acceptedDiv.appendChild(card);
      }
    });

    if (pendingDiv.innerHTML === '') pendingDiv.innerHTML = '<p style="text-align:center; color:#999;">No pending orders.</p>';
    if (acceptedDiv.innerHTML === '') acceptedDiv.innerHTML = '<p style="text-align:center; color:#999;">No active orders.</p>';

    renderCalendar();
  });

  window.updateStatus = async (orderKey, newStatus) => {
    const updates = {};
    updates[`orders/${orderKey}/status`] = newStatus;
    try {
      await update(ref(db), updates);
      alert("Status updated to: " + newStatus);
    } catch (e) { alert("Error: " + e.message); }
  };

  window.changeMonth = (offset) => { 
    currentViewDate.setMonth(currentViewDate.getMonth() + offset); 
    renderCalendar(); 
  };
  
  function renderCalendar() {
    const grid = document.getElementById('calendar-grid');
    const title = document.getElementById('calendar-month-year');
    if(!grid || !title) return;
    
    grid.innerHTML = '';
    const year = currentViewDate.getFullYear();
    const month = currentViewDate.getMonth();
    title.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(currentViewDate);

    ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(d => grid.innerHTML += `<div class="day-label">${d}</div>`);
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for(let x = 0; x < firstDay; x++) grid.innerHTML += `<div></div>`;
    for(let d = 1; d <= daysInMonth; d++) {
      const dateStr = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const dayOrders = Object.values(allOrders).filter(o => o.date === dateStr);
      const dayDiv = document.createElement('div');
      dayDiv.className = `cal-day ${dayOrders.length > 0 ? 'has-booking' : ''}`;
      dayDiv.innerHTML = `<span>${d}</span><div class="dot-container">${dayOrders.map(() => '<span class="dot"></span>').join('')}</div>`;
      dayDiv.onclick = () => viewDay(dateStr);
      grid.appendChild(dayDiv);
    }
  }

  window.viewDay = (date) => {
    const list = document.getElementById('day-orders-list');
    const orders = Object.values(allOrders).filter(o => o.date === date);
    if(orders.length === 0) {
      list.innerHTML = `<p style="color:#999; padding:10px;">No bookings for ${date}.</p>`;
      return;
    }
    list.innerHTML = `<h3 style="margin-bottom:15px; color:var(--primary-dark);">Bookings for ${date}:</h3>` + orders.map(o => `
      <div class="order-card" style="border-left: 5px solid var(--primary); padding: 12px; background: #fff;">
        <strong>${o.customerName}</strong> [${o.status}]
        <ul style="margin: 5px 0; padding-left: 15px; font-size: 0.8rem;">
            ${o.items ? o.items.map(i => `<li>${i.quantity}x ${i.name}</li>`).join('') : ''}
        </ul>
      </div>
    `).join('');
  };
</script>
</body>
</html>
