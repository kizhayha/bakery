<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customize Your Cake - C&N Bakery</title>
  <link rel="stylesheet" href="css/cus.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
      authDomain: "candn-bakery.firebaseapp.com",
      databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "candn-bakery",
      storageBucket: "candn-bakery.appspot.com",
      messagingSenderId: "620414447517",
      appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      const nameTag = document.getElementById('user-name-display');
      const logoutBtn = document.getElementById('logout-trigger');
      const signupBtn = document.getElementById('signup-trigger');
      
      if (user) {
        if(logoutBtn) logoutBtn.classList.remove('hidden');
        if(signupBtn) signupBtn.classList.add('hidden');
        const snap = await get(ref(db, "users/" + user.uid));
        if (snap.exists() && nameTag) nameTag.innerText = "Hi, " + snap.val().name;
      } else {
        // Redirect to index if not logged in to force auth
        window.location.href = 'index.html';
      }
    });

    window.handleLogout = () => signOut(auth);

    // Sync icon clicks with index.html logic
    window.checkAuth = function(event) {
      const target = event.currentTarget; 
      if (target.classList.contains('fa-shopping-cart')) { window.location.href = 'cart.html'; } 
      else if (target.classList.contains('fa-user-circle')) { window.location.href = 'user.html'; } 
    };
  </script>
</head>
<body>

  <header>
    <div class="container nav-flex">
      <div class="logo-text" onclick="location.href='index.html'" style="cursor:pointer">C&N <span>Bakery</span></div>
      
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
      </label>

      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="faq.html">FAQ</a></li> 
        </ul>

        <div class="auth-area">
          <div class="nav-icons">
            <i class="fas fa-shopping-cart" title="Cart" onclick="checkAuth(event)"></i>
            <i class="fas fa-user-circle" title="Account" onclick="checkAuth(event)"></i>
          </div>
          <span id="user-name-display"></span>
          <button id="signup-trigger" class="btn-primary" onclick="location.href='index.html'">Sign Up</button>
          <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="container cus-container">
    <div class="cus-card">
      <div class="form-section">
        <h2>Design Your <span>Dream Cake</span></h2>
        
        <div class="selection-group">
          <label>Number of Layers</label>
          <select id="layers" onchange="updatePrice()">
            <option value="1" data-price="500">1 Layer - ₱500</option>
            <option value="2" data-price="1200">2 Layers - ₱1,200</option>
            <option value="3" data-price="2500">3 Layers - ₱2,500</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Chiffon Flavor</label>
          <select id="flavor" onchange="updatePrice()">
            <option value="Vanilla" data-price="0">Classic Vanilla (+₱0)</option>
            <option value="Chocolate" data-price="50">Rich Chocolate (+₱50)</option>
            <option value="Red Velvet" data-price="100">Red Velvet (+₱100)</option>
            <option value="Ube" data-price="80">Ube Halaya (+₱80)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Frosting Kind</label>
          <select id="frosting" onchange="updatePrice()">
            <option value="Whipped Cream" data-price="0">Whipped Cream (+₱0)</option>
            <option value="Buttercream" data-price="100">Buttercream (+₱100)</option>
            <option value="Cream Cheese" data-price="200">Cream Cheese (+₱200)</option>
            <option value="Chocolate Ganache" data-price="150">Chocolate Ganache (+₱150)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Design Style</label>
          <select id="design" onchange="updatePrice()">
            <option value="Simple Piping" data-price="0">Simple Piping (+₱0)</option>
            <option value="Printable Topper" data-price="150">Printable Topper (+₱150)</option>
            <option value="Full Fondant Topper" data-price="450">Full Fondant Topper (+₱450)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Upload Reference (Optional)</label>
          <input type="file" id="cake-ref" accept="image/*" onchange="previewImage(event)">
        </div>

        <div class="price-display">
          <p>Estimated Total</p>
          <h3 id="total-price">₱500</h3>
        </div>

        <button class="btn-primary" style="margin-top: 20px; width:100%; padding:18px; font-size: 1.1rem;" onclick="showSummary()">Review Order Summary</button>
      </div>

      <div class="preview-section" id="preview-box">
        <i class="fas fa-birthday-cake" style="font-size: 4rem; color: #ffc1d1;"></i>
        <p style="margin-top: 15px; color: #aaa;">Reference Image Preview</p>
        <img id="image-preview" src="" alt="Cake Reference" style="display:none; width: 100%; border-radius: 15px;">
      </div>
    </div>
  </div>

  <div id="summary-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeSummary()">×</span>
      <h2 style="color: var(--primary-dark); text-align: center;">Order Summary</h2>
      <ul class="summary-list" id="summary-details"></ul>
      <div class="price-display" style="margin-bottom: 25px;">
        <h3 id="modal-total">₱500</h3>
      </div>
      <button id="add-to-cart-btn" class="btn-primary" style="width:100%; padding:18px;" onclick="addToCart()">Confirm & Add to Cart</button>
    </div>
  </div>

  <script>
    function updatePrice() {
      const layersPrice = parseInt(document.getElementById('layers').selectedOptions[0].dataset.price) || 0;
      const flavorPrice = parseInt(document.getElementById('flavor').selectedOptions[0].dataset.price) || 0;
      const frostingPrice = parseInt(document.getElementById('frosting').selectedOptions[0].dataset.price) || 0;
      const designPrice = parseInt(document.getElementById('design').selectedOptions[0].dataset.price) || 0;
      
      const total = layersPrice + flavorPrice + frostingPrice + designPrice;
      document.getElementById('total-price').innerText = "₱" + total.toLocaleString();
      return total;
    }

    function previewImage(event) {
      const reader = new FileReader();
      const output = document.getElementById('image-preview');
      const icon = document.querySelector('#preview-box i');
      const text = document.querySelector('#preview-box p');

      reader.onload = function() {
        output.src = reader.result;
        output.style.display = "block";
        icon.style.display = "none";
        text.style.display = "none";
      }
      if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
    }

    function showSummary() {
      const layers = document.getElementById('layers').value;
      const flavor = document.getElementById('flavor').value;
      const frosting = document.getElementById('frosting').value;
      const design = document.getElementById('design').value;
      const total = document.getElementById('total-price').innerText;

      document.getElementById('summary-details').innerHTML = `
        <li><span>Layers:</span> <strong>${layers}</strong></li>
        <li><span>Flavor:</span> <strong>${flavor}</strong></li>
        <li><span>Frosting:</span> <strong>${frosting}</strong></li>
        <li><span>Design:</span> <strong>${design}</strong></li>
      `;
      document.getElementById('modal-total').innerText = total;
      document.getElementById('summary-modal').classList.add('active');
    }

    function closeSummary() {
      document.getElementById('summary-modal').classList.remove('active');
    }

    function getResizedImage(img) {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const maxWidth = 300;
        const scale = maxWidth / img.naturalWidth;
        canvas.width = maxWidth;
        canvas.height = img.naturalHeight * scale;
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        return canvas.toDataURL('image/jpeg', 0.7);
    }

    function addToCart() {
        const btn = document.getElementById('add-to-cart-btn');
        const previewImg = document.getElementById('image-preview');
        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
            const rawPrice = document.getElementById('total-price').innerText;
            const numericPrice = parseFloat(rawPrice.replace(/[₱,]/g, ''));
            
            let imageToSave = 'https://via.placeholder.com/150?text=Custom+Cake';
            if (previewImg.style.display === "block") {
                imageToSave = getResizedImage(previewImg);
            }

            const customItem = {
                id: "CUSTOM-" + Date.now(),
                name: "Customized Cake",
                price: numericPrice,
                quantity: 1,
                image: imageToSave,
                details: {
                    layers: document.getElementById('layers').value,
                    flavor: document.getElementById('flavor').value,
                    frosting: document.getElementById('frosting').value,
                    design: document.getElementById('design').value
                }
            };

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            cart.push(customItem);
            localStorage.setItem('cart', JSON.stringify(cart));

            setTimeout(() => {
                window.location.href = 'cart.html';
            }, 500);

        } catch (error) {
            console.error(error);
            alert("Storage full! Try a smaller photo.");
            btn.innerText = "Confirm & Add to Cart";
            btn.disabled = false;
        }
    }

    window.onload = updatePrice;
  </script>
</body>
</html>
