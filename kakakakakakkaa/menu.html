<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Our Sweet Menu</title>
 
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
 
  <link rel="stylesheet" href="css/menu.css">
  
  <style>
    /* Quick skeleton loading styles — add to your menu.css later if you want */
    .skeleton {
      background: #f8f8f8;
      border-radius: 12px;
      overflow: hidden;
    }
    .skeleton-img {
      height: 220px;
      background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%);
      background-size: 200% 100%;
      animation: loading 1.8s infinite;
    }
    .skeleton-text, .skeleton-btn {
      height: 18px;
      margin: 14px 16px;
      background: #e0e0e0;
      border-radius: 6px;
    }
    .skeleton-btn {
      height: 46px;
      margin: 16px;
    }
    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      padding: 100px 20px;
      color: #d32f2f;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <header>
    <div class="container nav-flex">
      <a href="index.html" class="logo-text">C&N <span>Bakery</span></a>
     
      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label">
        <span></span>
      </label>
      <nav class="nav-links" id="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html" class="active">Menu</a></li>
          <li><a href="faq.html">FAQ</a></li>
        </ul>
        <div class="auth-area">
          <div class="nav-icons">
            <div class="cart-wrapper">
              <i class="fas fa-shopping-cart" title="Cart" onclick="checkAuth(event)"></i>
              <span id="cart-count-header">0</span>
            </div>
            <div class="user-wrapper">
              <i class="fas fa-user-circle" title="Account" onclick="checkAuth(event)"></i>
            </div>
          </div>
          <span id="user-name-display"></span>
          <button id="signup-trigger" class="btn-primary" onclick="window.location.href='index.html'">Sign Up</button>
          <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="menu-header">
      <h1>Our <span>Sweet Menu</span></h1>
    </div>

    <div class="filter-section">
      <div class="filter-box">
        <label><i class="fas fa-coins"></i> Budget Range:</label>
        <div class="price-range-buttons">
          <button class="price-filter-btn active" data-min="0" data-max="999999">Any</button>
          <button class="price-filter-btn" data-min="0" data-max="199">₱0 - ₱199</button>
          <button class="price-filter-btn" data-min="200" data-max="500">₱200 - ₱500</button>
          <button class="price-filter-btn" data-min="501" data-max="999999">₱501+</button>
        </div>
      </div>
    </div>

    <div class="categories">
      <button class="category-btn active" data-category="cakes">Cakes</button>
      <button class="category-btn" data-category="pastries">Pastries</button>
      <button class="category-btn" data-category="custom">Custom Cakes</button>
    </div>

    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">×</span>
      <img id="modalImg" src="" alt="Product" loading="lazy">
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <button id="modalAddToCart" class="btn-primary">Add to Cart</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
      authDomain: "candn-bakery.firebaseapp.com",
      databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "candn-bakery",
      storageBucket: "candn-bakery.appspot.com",
      messagingSenderId: "620414447517",
      appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ── Mobile menu toggle ────────────────────────────────────────
    document.getElementById('nav-toggle')?.addEventListener('change', (e) => {
      document.body.style.overflow = e.target.checked ? 'hidden' : '';
    });

    // ── Auth state ────────────────────────────────────────────────
    onAuthStateChanged(auth, async (user) => {
      const signupBtn   = document.getElementById('signup-trigger');
      const logoutBtn   = document.getElementById('logout-trigger');
      const nameTag     = document.getElementById('user-name-display');

      if (user) {
        signupBtn?.classList.add('hidden');
        logoutBtn?.classList.remove('hidden');
        const snap = await get(ref(db, "users/" + user.uid));
        if (snap.exists()) {
          nameTag.innerText = "Hi, " + (snap.val().name || "User");
        }
      } else {
        signupBtn?.classList.remove('hidden');
        logoutBtn?.classList.add('hidden');
        nameTag.innerText = "";
      }
    });

    window.handleLogout = () => signOut(auth);

    window.checkAuth = (event) => {
      const logoutBtn = document.getElementById('logout-trigger');
      const isLoggedIn = !logoutBtn?.classList.contains('hidden');

      if (!isLoggedIn) {
        window.location.href = 'index.html';
        return;
      }

      const target = event.currentTarget;
      if (target.classList.contains('fa-shopping-cart')) {
        window.location.href = 'cart.html';
      } else if (target.classList.contains('fa-user-circle')) {
        window.location.href = 'user.html';
      }
    };

    // ── Cart logic ────────────────────────────────────────────────
    const getCart = () => JSON.parse(localStorage.getItem('cart') || '[]');
    const saveCart = (cart) => {
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
    };

    const addToCart = (product) => {
      let cart = getCart();
      const existing = cart.find(item => item.id === product.id);
      if (existing) {
        existing.quantity = (existing.quantity || 1) + 1;
      } else {
        cart.push({ ...product, quantity: 1 });
      }
      saveCart(cart);

      document.querySelectorAll(`.btn-add[data-id="${product.id}"]`).forEach(btn => {
        const originalText = btn.textContent;
        btn.textContent = "Added ✓";
        btn.style.background = 'var(--brown)';
        setTimeout(() => {
          btn.textContent = originalText;
          btn.style.background = '';
        }, 1400);
      });
    };

    const updateCartCount = () => {
      const cart = getCart();
      const total = cart.reduce((sum, item) => sum + (item.quantity || 0), 0);
      const countEl = document.getElementById('cart-count-header');
      if (countEl) {
        countEl.textContent = total;
        countEl.style.display = total > 0 ? 'flex' : 'none';
      }
    };

    // ── Modal handlers ────────────────────────────────────────────
    const modal = document.getElementById('productModal');
    let currentSelectedProduct = null;

    const openProductModal = (product) => {
      currentSelectedProduct = product;
      document.getElementById('modalImg').src = product.image || 'https://via.placeholder.com/420x300?text=No+Image';
      document.getElementById('modalTitle').textContent = product.name;
      document.getElementById('modalPrice').textContent = `₱${Number(product.price).toFixed(2)}`;
      document.getElementById('modalDesc').textContent = product.description || "Freshly baked with love using premium ingredients.";
      modal.classList.add('active');
    };

    document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
    document.getElementById('modalAddToCart').onclick = () => {
      if (currentSelectedProduct) addToCart(currentSelectedProduct);
      modal.classList.remove('active');
    };

    // ── Data & UI logic ───────────────────────────────────────────
    const productsByCategory = { cakes: [], pastries: [], custom: [] };
    const grid = document.getElementById('product-grid');
    const categoryButtons = document.querySelectorAll('.category-btn');
    const budgetButtons = document.querySelectorAll('.price-filter-btn');

    function showSkeletons(count = 8) {
      grid.innerHTML = '';
      for (let i = 0; i < count; i++) {
        const skel = document.createElement('div');
        skel.className = 'cake-item skeleton';
        skel.innerHTML = `
          <div class="skeleton-img"></div>
          <div class="skeleton-text"></div>
          <div class="skeleton-text short" style="width:60%;"></div>
          <div class="skeleton-btn"></div>
        `;
        grid.appendChild(skel);
      }
    }

    function getActiveBudgetRange() {
      const activeBtn = document.querySelector('.price-filter-btn.active');
      if (!activeBtn) return { min: 0, max: Infinity };
      const min = parseFloat(activeBtn.dataset.min) || 0;
      const max = parseFloat(activeBtn.dataset.max) || Infinity;
      return { min, max };
    }

    function renderProducts(category) {
      grid.innerHTML = '';

      const { min, max } = getActiveBudgetRange();
      const items = (productsByCategory[category] || [])
        .filter(p => {
          const price = parseFloat(p.price);
          return !isNaN(price) && price >= min && price <= max;
        });

      if (items.length === 0) {
        const label = document.querySelector('.price-filter-btn.active')?.textContent?.trim() || 'any price';
        grid.innerHTML = `<p class="error-msg">No products found within ${label} in this category.</p>`;
        return;
      }

      const fragment = document.createDocumentFragment();

      items.forEach(product => {
        const card = document.createElement('div');
        card.className = 'cake-item';
        card.innerHTML = `
          <img src="${product.image || 'https://via.placeholder.com/300x250?text=' + encodeURIComponent(product.name)}" 
               alt="${product.name}" loading="lazy" width="300" height="250">
          <h3>${product.name}</h3>
          <p class="price">₱${Number(product.price).toFixed(2)}</p>
          <button class="btn-primary btn-add" data-id="${product.id}">Add to Cart</button>
        `;
        card.addEventListener('click', e => {
          if (!e.target.closest('button')) openProductModal(product);
        });
        fragment.appendChild(card);
      });

      grid.appendChild(fragment);
    }

    async function loadCategory(category) {
      if (category === 'custom') return;

      showSkeletons();

      try {
        const snapshot = await get(ref(db, `products/${category}`));
        const list = [];
        const data = snapshot.val();
        if (data) {
          Object.entries(data).forEach(([id, p]) => {
            list.push({ id, ...p });
          });
        }
        productsByCategory[category] = list;

        const activeCat = document.querySelector('.category-btn.active')?.dataset.category;
        if (activeCat === category) {
          renderProducts(category);
        }
      } catch (err) {
        grid.innerHTML = `<p class="error-msg">Failed to load products. Please check your connection and try again.</p>`;
        console.error("Load error:", err);
      }
    }

    // ── Category switching ────────────────────────────────────────
    categoryButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const category = btn.dataset.category;

        if (category === 'custom') {
          window.location.href = 'cus.html';
          return;
        }

        categoryButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        loadCategory(category);
      });
    });

    // ── Price filter ──────────────────────────────────────────────
    budgetButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        budgetButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const activeCategory = document.querySelector('.category-btn.active')?.dataset.category;
        if (activeCategory && activeCategory !== 'custom') {
          renderProducts(activeCategory);
        }
      });
    });

    // ── Add to cart delegation (works even after render) ──────────
    grid.addEventListener('click', (e) => {
      const addBtn = e.target.closest('.btn-add');
      if (addBtn) {
        e.stopPropagation();
        const id = addBtn.dataset.id;
        const activeCategory = document.querySelector('.category-btn.active')?.dataset.category;
        const prod = productsByCategory[activeCategory]?.find(p => p.id === id);
        if (prod) addToCart(prod);
        return;
      }

      const card = e.target.closest('.cake-item');
      if (!card) return;

      const id = card.querySelector('.btn-add')?.dataset.id;
      const activeCategory = document.querySelector('.category-btn.active')?.dataset.category;
      const prod = productsByCategory[activeCategory]?.find(p => p.id === id);
      if (prod) openProductModal(prod);
    });

    // ── Initial load ──────────────────────────────────────────────
    loadCategory('cakes');
    updateCartCount();
  </script>
</body>
</html>
