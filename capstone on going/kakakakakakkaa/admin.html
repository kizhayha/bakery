<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Admin Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #ff8fab; --primary-dark: #c9184a; --bg: #fff5f7;
      --card: #ffffff; --text: #2d2d2d; --muted: #888; --border: #f0e0e5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* Login Overlay */
    #login-overlay { position: fixed; inset: 0; background: linear-gradient(135deg, #ffe0ea, #ffc2d4); display: flex; align-items: center; justify-content: center; z-index: 9999; }
    .login-box { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 20px 60px rgba(201,24,74,0.15); width: 340px; }
    .login-box h2 { color: var(--primary-dark); margin-bottom: 20px; font-size: 1.4rem; }
    .login-box input { width: 100%; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; margin-bottom: 15px; outline: none; }

    header { background: linear-gradient(90deg, var(--primary-dark), #ff4d6d); color: white; padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .logo-text { font-size: 1.3rem; font-weight: 700; color: white; text-decoration: none; }
    
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 20px; }
    
    /* Navigation */
    .nav-tabs { display: flex; gap: 8px; background: white; padding: 8px; border-radius: 14px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow-x: auto; }
    .nav-link { flex: 1; text-align: center; padding: 12px; border-radius: 10px; text-decoration: none; color: var(--muted); font-weight: 600; white-space: nowrap; transition: 0.2s; }
    .nav-link:hover { background: var(--bg); color: var(--primary-dark); }
    .nav-link.active { background: var(--primary-dark); color: white; }

    .welcome-card { background: white; padding: 60px 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
    .welcome-card i { font-size: 4rem; color: var(--primary); margin-bottom: 20px; }
    .btn-main { background: var(--primary-dark); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; font-family: inherit; }
  </style>
</head>
<body>

<div id="login-overlay">
  <div class="login-box">
    <h2><i class="fas fa-lock"></i> Admin Portal</h2>
    <input type="password" id="admin-pass" placeholder="Enter password" onkeydown="if(event.key==='Enter') checkLogin()">
    <button class="btn-main" onclick="checkLogin()">Unlock Dashboard</button>
  </div>
</div>

<header>
  <div class="header-container">
    <a href="#" class="logo-text">C&N <span>Bakery</span> Admin</a>
  </div>
</header>

<div class="container">
  <div class="nav-tabs">
    <a href="admin.html" class="nav-link active"><i class="fas fa-home"></i> Home</a>
    <a href="sales.html" class="nav-link"><i class="fas fa-chart-line"></i> Sales</a>
    <a href="orders.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Orders</a>
    <a href="schedule.html" class="nav-link"><i class="fas fa-calendar-alt"></i> Schedule</a>
    <a href="admin_menu.html" class="nav-link"><i class="fas fa-birthday-cake"></i> Menu</a>
     <a href="history.html" class="nav-link active">History</a>
  </div>

  <div class="welcome-card">
    <i class="fas fa-user-shield"></i>
    <h1>Welcome, C&N Admin!</h1>
    <p style="color: var(--muted); margin-top: 15px; font-size: 1.1rem;">Your management hub is ready. Choose a module above to get started.</p>
  </div>
</div>

<script>
  window.checkLogin = () => {
    if (document.getElementById('admin-pass').value === "digitaldealers") {
      document.getElementById('login-overlay').style.display = 'none';
      sessionStorage.setItem('adminLoggedIn', 'true');
    } else { alert("Access Denied."); }
  };
  if(sessionStorage.getItem('adminLoggedIn') === 'true') {
    document.getElementById('login-overlay').style.display = 'none';
  }
</script>
</body>
</html>
