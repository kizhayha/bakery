<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Our Sweet Menu</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <link rel="stylesheet" href="css/menu.css">

  <style>
    /* Skeleton loader */
    .skeleton { background: #f8f8f8; border-radius: 12px; overflow: hidden; }
    .skeleton-img { height: 220px; background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: loading 1.8s infinite; }
    .skeleton-text, .skeleton-btn { height: 18px; margin: 14px 16px; background: #e0e0e0; border-radius: 6px; }
    .skeleton-btn { height: 46px; margin: 16px; }
    @keyframes loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .error-msg { grid-column: 1 / -1; text-align: center; padding: 100px 20px; color: #d32f2f; font-size: 1.1rem; }
  </style>
</head>
<body>
  <header>
    <div class="container nav-flex">
      <a href="index.html" class="logo-text">C&N <span>Bakery</span></a>

      <input type="checkbox" id="nav-toggle" class="nav-toggle">
      <label for="nav-toggle" class="nav-toggle-label"><span></span></label>

      <nav class="nav-links" id="nav-menu">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html" class="active">Menu</a></li>
          <li><a href="faq.html">FAQ</a></li>
        </ul>
        <div class="auth-area">
          <div class="nav-icons">
            <div class="cart-wrapper">
              <i class="fas fa-shopping-cart" title="Cart" onclick="checkAuth(event)"></i>
              <span id="cart-count-header">0</span>
            </div>
            <div class="user-wrapper">
              <i class="fas fa-user-circle" title="Account" onclick="checkAuth(event)"></i>
            </div>
          </div>
          <span id="user-name-display"></span>
          <button id="signup-trigger" class="btn-primary" onclick="window.location.href='index.html'">Sign Up</button>
          <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
        </div>
      </nav>
    </div>
  </header>

  <div class="container">
    <div class="menu-header">
      <h1>Our <span>Sweet Menu</span></h1>
    </div>

    <div class="filter-section">
      <div class="filter-box">
        <label><i class="fas fa-coins"></i> Budget Range:</label>
        <div class="price-range-buttons">
          <button class="price-filter-btn active" data-min="0" data-max="999999">Any</button>
          <button class="price-filter-btn" data-min="0" data-max="199">₱0 - ₱199</button>
          <button class="price-filter-btn" data-min="200" data-max="500">₱200 - ₱500</button>
          <button class="price-filter-btn" data-min="501" data-max="999999">₱501+</button>
        </div>
      </div>
    </div>

    <div class="categories">
      <button class="category-btn active" data-category="cakes">Cakes</button>
      <button class="category-btn" data-category="pastries">Pastries</button>
      <button class="category-btn" data-category="custom">Custom Cakes</button>
    </div>

    <div class="product-grid" id="product-grid"></div>
  </div>

  <!-- Product Detail Modal -->
  <div id="productModal" class="modal">
    <div class="modal-content">
      <span class="modal-close" id="closeModal">×</span>
      <img id="modalImg" src="" alt="Product" loading="lazy">
      <div class="modal-body">
        <h2 id="modalTitle"></h2>
        <div class="modal-price" id="modalPrice"></div>
        <p class="modal-desc" id="modalDesc"></p>
        <button id="modalAddToCart" class="btn-primary">Add to Cart</button>
      </div>
    </div>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
  authDomain: "candn-bakery.firebaseapp.com",
  databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "candn-bakery",
  storageBucket: "candn-bakery.appspot.com",
  messagingSenderId: "620414447517",
  appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

const grid = document.getElementById('product-grid');
let productsByCategory = { cakes: [], pastries: [], custom: [] };
let currentSelectedProduct = null;

// ── Auth state ─────────────────────────────
onAuthStateChanged(auth, async (user) => {
  const signupBtn = document.getElementById('signup-trigger');
  const logoutBtn = document.getElementById('logout-trigger');
  const nameTag = document.getElementById('user-name-display');
  if (user) {
    signupBtn?.classList.add('hidden');
    logoutBtn?.classList.remove('hidden');
    const snap = await get(ref(db, "users/" + user.uid));
    if (snap.exists()) nameTag.innerText = "Hi, " + (snap.val().name || "User");
  } else {
    signupBtn?.classList.remove('hidden');
    logoutBtn?.classList.add('hidden');
    nameTag.innerText = "";
  }
});

window.handleLogout = () => signOut(auth);
window.checkAuth = (e) => {
  const loggedIn = !document.getElementById('logout-trigger').classList.contains('hidden');
  if (!loggedIn) return window.location.href = 'index.html';
  window.location.href = e.currentTarget.classList.contains('fa-shopping-cart') ? 'cart.html' : 'user.html';
};

// ── Cart logic with Category ─────────────────────────────
const getCart = () => JSON.parse(localStorage.getItem('cart') || '[]');
const saveCart = (cart) => { localStorage.setItem('cart', JSON.stringify(cart)); updateCartCount(); };
const updateCartCount = () => {
  const countEl = document.getElementById('cart-count-header');
  const total = getCart().reduce((sum, i) => sum + (i.quantity || 0), 0);
  if (countEl) countEl.textContent = total;
};

const addToCart = (product) => {
  let cart = getCart();

  // Determine category
  let category = "Others";
  if (product.category === "cakes") category = "Regular Cake";
  else if (product.category === "pastries") category = "Pastries";

  const itemToAdd = {
    ...product,
    category: category,
    id: product.id || Date.now()
  };

  const existing = cart.find(i => i.id === itemToAdd.id);
  if (existing) existing.quantity = (existing.quantity || 1) + 1;
  else cart.push({ ...itemToAdd, quantity: 1 });

  saveCart(cart);

  // Visual feedback
  document.querySelectorAll(`.btn-add[data-id="${product.id}"]`).forEach(btn => {
    const originalText = btn.textContent;
    btn.textContent = "Added ✓";
    btn.disabled = true;
    setTimeout(() => { btn.textContent = originalText; btn.disabled = false; }, 1200);
  });
};

// ── Modal ─────────────────────────────
const modal = document.getElementById('productModal');
const openProductModal = (p) => {
  currentSelectedProduct = p;
  document.getElementById('modalImg').src = p.image || 'https://via.placeholder.com/420x300?text=No+Image';
  document.getElementById('modalTitle').textContent = p.name;
  document.getElementById('modalPrice').textContent = `₱${Number(p.price).toFixed(2)}`;
  document.getElementById('modalDesc').textContent = p.description || "Freshly baked with love.";
  modal.classList.add('active');
};

document.getElementById('closeModal').onclick = () => modal.classList.remove('active');
document.getElementById('modalAddToCart').onclick = () => {
  if (currentSelectedProduct) addToCart(currentSelectedProduct);
  modal.classList.remove('active');
};

// ── Render & Fetch ─────────────────────────────
function showSkeletons(count = 8) {
  grid.innerHTML = '';
  for (let i = 0; i < count; i++) {
    const skel = document.createElement('div');
    skel.className = 'cake-item skeleton';
    skel.innerHTML = `<div class="skeleton-img"></div><div class="skeleton-text"></div><div class="skeleton-text short" style="width:60%"></div><div class="skeleton-btn"></div>`;
    grid.appendChild(skel);
  }
}

function renderProducts(category) {
  const activeBtn = document.querySelector('.price-filter-btn.active');
  const min = parseFloat(activeBtn?.dataset.min || 0);
  const max = parseFloat(activeBtn?.dataset.max || Infinity);

  const items = (productsByCategory[category]||[]).filter(p => p.price >= min && p.price <= max);
  grid.innerHTML = '';

  if (!items.length) {
    grid.innerHTML = `<p class="error-msg">No products found in this range.</p>`;
    return;
  }

  items.forEach(p => {
    const card = document.createElement('div');
    card.className = 'cake-item';
    card.innerHTML = `
      <img src="${p.image||'https://via.placeholder.com/300x250'}" alt="${p.name}">
      <h3>${p.name}</h3>
      <p class="price">₱${Number(p.price).toFixed(2)}</p>
      <button class="btn-primary btn-add" data-id="${p.id}">Add to Cart</button>
    `;
    card.addEventListener('click', e => {
      if (!e.target.closest('button')) openProductModal(p);
    });
    grid.appendChild(card);
  });
}

async function fetchCategory(category) {
  showSkeletons();
  const snap = await get(ref(db, `products/${category}`));
  productsByCategory[category] = snap.exists() 
    ? Object.entries(snap.val()).map(([id, p]) => ({id, ...p, category})) 
    : [];
  renderProducts(category);
}

// Filters
document.querySelectorAll('.category-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.category;
    if (cat === 'custom') return window.location.href = 'cus.html';

    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    fetchCategory(cat);
  });
});

document.querySelectorAll('.price-filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.price-filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const activeCat = document.querySelector('.category-btn.active')?.dataset.category;
    if (activeCat && activeCat !== 'custom') renderProducts(activeCat);
  });
});

grid.addEventListener('click', e => {
  const btn = e.target.closest('.btn-add');
  if (!btn) return;
  e.stopPropagation();
  const id = btn.dataset.id;
  const cat = document.querySelector('.category-btn.active')?.dataset.category;
  const prod = productsByCategory[cat]?.find(p => p.id === id);
  if (prod) addToCart(prod);
});

// Initial Load
fetchCategory('cakes');
updateCartCount();
</script>
</body>
</html>
