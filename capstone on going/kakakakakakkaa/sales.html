<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Sales & Analytics</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --primary: #ff8fab; 
      --primary-dark: #c9184a; 
      --bg: #fff5f7;
      --card: #ffffff; 
      --text: #2d2d2d; 
      --muted: #888; 
      --border: #f0e0e5;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); }
    
    header { 
      background: linear-gradient(90deg, var(--primary-dark), #ff4d6d); 
      color: white; padding: 15px 24px; text-align: center; font-weight: bold; font-size: 1.2rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }

    .nav-tabs { 
      display: flex; gap: 8px; background: white; padding: 8px; border-radius: 14px; margin-bottom: 24px; 
      box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow-x: auto; 
    }
    
    .nav-link { 
      flex: 1; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; 
      color: #888; font-weight: 600; white-space: nowrap; transition: 0.3s;
    }
    .nav-link.active { background: var(--primary-dark); color: white; }

    .stats-grid { 
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); 
      gap: 16px; margin-bottom: 24px; 
    }
    
    .stat-box { 
      background: white; padding: 25px; border-radius: 15px; text-align: center; 
      border-bottom: 4px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.03); 
    }
    .stat-box h3 { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .stat-box p { font-size: 1.6rem; font-weight: 700; color: var(--primary-dark); }

    .charts-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; margin-bottom: 24px; }
    .chart-card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .chart-card h3 { font-size: 1rem; margin-bottom: 20px; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 10px; }
    
    .top-sales-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
    .top-sales-card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.03); }
    .top-sales-card h3 { margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; font-size: 1.1rem; }
    .product-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed #eee; }
    .product-row:last-child { border-bottom: none; }
    .qty-badge { background: var(--bg); color: var(--primary-dark); padding: 4px 10px; border-radius: 8px; font-weight: bold; font-size: 0.85rem; }

    @media (max-width: 850px) { .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header>C&N Bakery</header>

<div class="container">
  <div class="nav-tabs">
    <a href="admin.html" class="nav-link">Home</a>
    <a href="sales.html" class="nav-link active">Sales</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="schedule.html" class="nav-link">Schedule</a>
    <a href="admin_menu.html" class="nav-link">Menu</a>
     <a href="history.html" class="nav-link active">History</a>
  </div>

  <div class="stats-grid">
    <div class="stat-box"><h3>Total Lifetime Revenue</h3><p id="total-revenue">PHP 0</p></div>
    <div class="stat-box"><h3>Current Month</h3><p id="monthly-revenue">PHP 0</p></div>
    <div class="stat-box"><h3>Total Items Sold</h3><p id="total-items">0</p></div>
    <div class="stat-box"><h3>Unique Customers</h3><p id="total-customers">0</p></div>
  </div>

  <div class="charts-grid">
    <div class="chart-card">
      <h3>Monthly Revenue Trends</h3>
      <canvas id="sales-chart"></canvas>
    </div>
    <div class="chart-card">
      <h3>Product Category Split</h3>
      <canvas id="category-chart"></canvas>
    </div>
  </div>

  <div class="top-sales-grid">
    <div class="top-sales-card">
      <h3><i class="fas fa-birthday-cake" style="color:#ff8fab;"></i> Top Selling Cakes</h3>
      <div id="top-cakes-list"></div>
    </div>
    <div class="top-sales-card">
      <h3><i class="fas fa-cookie" style="color:#c9184a;"></i> Top Selling Pastries</h3>
      <div id="top-pastries-list"></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
    authDomain: "candn-bakery.firebaseapp.com",
    databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "candn-bakery"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let salesChart, categoryChart;

  onValue(ref(db, 'orders'), (snapshot) => {
    const orders = snapshot.val() || {};
    const orderList = Object.values(orders);
    
    let totalRev = 0, monthRev = 0, totalItems = 0;
    const cats = {}, monthlyRevData = Array(12).fill(0);
    const productRankings = { cakes: {}, pastries: {} }; 
    const customers = new Set();
    const now = new Date();

    orderList.forEach(o => {
      const amt = parseFloat(o.totalAmount) || 0;
      const date = new Date(o.createdAt || Date.now());
      
      totalRev += amt;
      
      // Monthly filtering logic
      if(date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear()) {
        monthRev += amt;
      }
      if(date.getFullYear() === now.getFullYear()) {
        monthlyRevData[date.getMonth()] += amt;
      }
      
      if(o.phone) customers.add(o.phone.trim());
      
      // Items processor (handles both Array and Object storage)
      const items = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
      items.forEach(i => {
        const qty = parseInt(i.quantity) || 1;
        const name = i.name || "Unnamed Item";
        const rawCat = (i.category || 'cakes').toLowerCase();
        
        totalItems += qty;
        
        // Grouping for Doughnut Chart
        const chartLabel = rawCat.charAt(0).toUpperCase() + rawCat.slice(1);
        cats[chartLabel] = (cats[chartLabel] || 0) + qty;

        // Ranking Logic
        if (productRankings[rawCat] !== undefined) {
          productRankings[rawCat][name] = (productRankings[rawCat][name] || 0) + qty;
        } else {
          // Fallback if category is different (e.g., 'custom')
          if(!productRankings[rawCat]) productRankings[rawCat] = {};
          productRankings[rawCat][name] = (productRankings[rawCat][name] || 0) + qty;
        }
      });
    });

    // Update Rankings UI
    updateRankingUI('top-cakes-list', productRankings.cakes);
    updateRankingUI('top-pastries-list', productRankings.pastries);

    // Update Stats UI
    document.getElementById('total-revenue').innerText = `PHP ${totalRev.toLocaleString()}`;
    document.getElementById('monthly-revenue').innerText = `PHP ${monthRev.toLocaleString()}`;
    document.getElementById('total-items').innerText = totalItems.toLocaleString();
    document.getElementById('total-customers').innerText = customers.size;

    // Refresh Charts
    renderSalesTrend(monthlyRevData);
    renderCategorySplit(cats);
  });

  function updateRankingUI(containerId, data) {
    const container = document.getElementById(containerId);
    if (!data) return;

    const sorted = Object.entries(data)
      .sort(([,a], [,b]) => b - a)
      .slice(0, 5);

    if (sorted.length === 0) {
      container.innerHTML = '<p style="color:#999; font-style:italic; padding:10px 0;">No items sold yet.</p>';
      return;
    }

    container.innerHTML = sorted.map(([name, qty]) => `
      <div class="product-row">
        <span>${name}</span>
        <span class="qty-badge">${qty} sold</span>
      </div>
    `).join('');
  }

  function renderSalesTrend(data) {
    if(salesChart) salesChart.destroy();
    salesChart = new Chart(document.getElementById('sales-chart'), {
      type: 'line',
      data: { 
        labels: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'], 
        datasets: [{ 
          label: 'Revenue', 
          data: data, 
          borderColor: '#c9184a', 
          backgroundColor: 'rgba(201, 24, 74, 0.1)',
          fill: true,
          tension: 0.4 
        }] 
      },
      options: { 
        responsive: true, 
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true } }
      }
    });
  }

  function renderCategorySplit(cats) {
    if(categoryChart) categoryChart.destroy();
    categoryChart = new Chart(document.getElementById('category-chart'), {
      type: 'doughnut',
      data: { 
        labels: Object.keys(cats), 
        datasets: [{ 
          data: Object.values(cats), 
          backgroundColor: ['#ff8fab','#6c5ce7','#00b894','#fdcb6e','#4834d4'] 
        }] 
      },
      options: { 
        responsive: true,
        plugins: { legend: { position: 'bottom' } }
      }
    });
  }
</script>
</body>
</html>
