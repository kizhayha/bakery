<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customize Your Cake - C&N Bakery</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    .cus-container { padding: 40px 0; }
    .cus-card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .form-section h2 { color: var(--primary-dark); margin-bottom: 25px; }
    .selection-group { margin-bottom: 20px; }
    .selection-group label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; }
    
    select, textarea, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
      resize: none;
    }
    textarea {
      min-height: 80px;
    }

    .price-display {
      background: var(--secondary);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-top: 20px;
    }
    .price-display h3 { color: var(--primary-dark); font-size: 1.5rem; }
    
    .preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fffafa;
      border: 2px dashed #ffc1d1;
      border-radius: 20px;
      padding: 20px;
    }
    #image-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 15px;
      margin-top: 15px;
      display: none;
    }

    .summary-list { text-align: left; list-style: none; margin: 20px 0; }
    .summary-list li { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
    
    @media (max-width: 768px) {
      .cus-card { grid-template-columns: 1fr; }
    }

    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
    .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
      authDomain: "candn-bakery.firebaseapp.com",
      databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "candn-bakery",
      storageBucket: "candn-bakery.appspot.com",
      messagingSenderId: "620414447517",
      appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    window.db = db;
    window.ref = ref;
    window.onValue = onValue;

    onAuthStateChanged(auth, async (user) => {
      if (!user) window.location.href = 'index.html';
    });

    window.handleLogout = () => signOut(auth);
  </script>
</head>
<body>

  <header>
    <div class="container nav-flex">
      <div class="logo-text">C&N <span>Bakery</span></div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="faq.html">FAQ</a></li> 
        </ul>
      </nav>
      <div class="auth-area">
        <div class="nav-icons">
          <i class="fas fa-shopping-cart" title="Cart" onclick="location.href='cart.html'"></i>
          <i class="fas fa-user-circle" title="Account" onclick="location.href='user.html'"></i>
        </div>
        <span id="user-name-display"></span>
        <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </header>

  <div class="container cus-container">
    <div class="cus-card">
      <div class="form-section">
        <h2>Design Your <span>Dream Cake</span></h2>
        
        <div class="selection-group"> 
          <label>Number of Layers</label>
          <select id="layers" onchange="updatePrice()"></select>
        </div>

        <div class="selection-group">
          <label>Chiffon Flavor</label>
          <select id="flavor" onchange="updatePrice()"></select>
        </div>

        <div class="selection-group">
          <label>Frosting Kind</label>
          <select id="frosting" onchange="updatePrice()"></select>
        </div>

        <div class="selection-group">
          <label>Design Style</label>
          <select id="design" onchange="updatePrice()"></select>
        </div>

        <div class="selection-group">
          <label>Special Message on Cake <small style="color:#888;">(optional)</small></label>
          <textarea id="message" placeholder="Happy Birthday Mommy! ❤️" maxlength="100"></textarea>
        </div>

        <div class="price-display">
          <p>Estimated Total</p>
          <h3 id="total-price">₱0</h3>
        </div>

        <button class="btn-primary full-width" style="margin-top: 20px; width:100%; padding:15px;" onclick="showSummary()">Order Summary</button>
      </div>

      <div class="preview-section" id="preview-box">
        <i class="fas fa-birthday-cake" style="font-size: 3rem; color: #ffc1d1;"></i>
        <p style="margin-top: 10px; color: #888;">Your reference image will appear here</p>
        <input type="file" id="cake-ref" accept="image/*" onchange="previewImage(event)" style="margin-top:15px;">
        <img id="image-preview" src="" alt="Cake Reference">
      </div>
    </div>
  </div>

  <div id="summary-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeSummary()">×</span>
      <h2>Order Summary</h2>
      <ul class="summary-list" id="summary-details"></ul>

      <div class="price-display" style="margin-bottom: 20px;">
        <h3>Total: <span id="modal-total">₱0</span></h3>
      </div>

      <button class="btn-primary full-width" style="width:100%; padding:15px;" onclick="addToCart()">Add to Cart</button>
    </div>
  </div>

  <script>
    function updatePrice() {
      const layers   = document.getElementById('layers')?.selectedOptions[0];
      const flavor   = document.getElementById('flavor')?.selectedOptions[0];
      const frosting = document.getElementById('frosting')?.selectedOptions[0];
      const design   = document.getElementById('design')?.selectedOptions[0];

      const total = (parseInt(layers?.dataset.price || 0)) +
                    (parseInt(flavor?.dataset.price || 0)) +
                    (parseInt(frosting?.dataset.price || 0)) +
                    (parseInt(design?.dataset.price || 0));

      document.getElementById('total-price').innerText = "₱" + total.toLocaleString('en-PH');
      return total;
    }

    function renderCustomizationOptions(data) {
      const mappings = [
        { key: 'layers',    selectId: 'layers',    placeholder: '-- Select Number of Layers --' },
        { key: 'flavors',   selectId: 'flavor',    placeholder: '-- Select Chiffon Flavor --' },
        { key: 'frostings', selectId: 'frosting',  placeholder: '-- Select Frosting Kind --' },
        { key: 'designs',   selectId: 'design',    placeholder: '-- Select Design Style --' }
      ];

      for (const { key, selectId, placeholder } of mappings) {
        const select = document.getElementById(selectId);
        if (!select) continue;

        select.innerHTML = '';

        const ph = document.createElement('option');
        ph.value = "";
        ph.textContent = placeholder;
        select.appendChild(ph);

        const items = Object.values(data?.[key] || {});
        items.forEach(opt => {
          if (opt.enabled !== true) return;
          const option = document.createElement('option');
          option.value = opt.name || '';
          option.textContent = opt.price > 0 ? `${opt.name} (+₱${opt.price})` : opt.name;
          option.dataset.price = Number(opt.price) || 0;
          select.appendChild(option);
        });
      }
      updatePrice();
    }

    document.addEventListener("DOMContentLoaded", () => {
      onValue(ref(db, "customization-options"), (snapshot) => {
        renderCustomizationOptions(snapshot.val());
      });
    });

    function previewImage(event) {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function() {
        document.getElementById('image-preview').src = reader.result;
        document.getElementById('image-preview').style.display = "block";
        document.querySelector('#preview-box i').style.display = "none";
        document.querySelector('#preview-box p').style.display = "none";
      };
      reader.readAsDataURL(file);
    }

    function showSummary() {
      const layers   = document.getElementById('layers')?.value   || '—';
      const flavor   = document.getElementById('flavor')?.value   || '—';
      const frosting = document.getElementById('frosting')?.value || '—';
      const design   = document.getElementById('design')?.value   || '—';
      const message  = document.getElementById('message')?.value.trim() || '—';
      const total    = document.getElementById('total-price')?.innerText || '₱0';

      document.getElementById('summary-details').innerHTML = `
        <li><span>Layers:</span> <strong>${layers}</strong></li>
        <li><span>Flavor:</span> <strong>${flavor}</strong></li>
        <li><span>Frosting:</span> <strong>${frosting}</strong></li>
        <li><span>Design:</span> <strong>${design}</strong></li>
        <li><span>Special Message:</span> <strong>${message}</strong></li>
      `;
      document.getElementById('modal-total').innerText = total;
      document.getElementById('summary-modal').classList.add('active');
    }

    function closeSummary() {
      document.getElementById('summary-modal').classList.remove('active');
    }

    function addToCart() {
      const price = parseFloat(document.getElementById('total-price').innerText.replace(/[₱,]/g, '')) || 0;
      const refImage = document.getElementById('image-preview').src || '';
      const message = document.getElementById('message').value.trim();

      const customCake = {
        name: "Customized Cake",
        price: price,
        quantity: 1,
        category: "Customize Cake",
        
        layers:   document.getElementById('layers')?.value   || '',
        flavor:   document.getElementById('flavor')?.value   || '',
        frosting: document.getElementById('frosting')?.value || '',
        design:   document.getElementById('design')?.value   || '',
        message:  message,
        
        notes:   "",
        referencePhoto: refImage || 'https://via.placeholder.com/300?text=No+Reference+Photo',

        image: refImage || 'https://via.placeholder.com/300?text=Custom+Cake',
        
        id: "custom-" + Date.now()
      };

      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push(customCake);
      localStorage.setItem('cart', JSON.stringify(cart));

      alert("✅ Custom Cake added to cart!");
      window.location.href = 'cart.html';
    }
  </script>
</body>
</html>
