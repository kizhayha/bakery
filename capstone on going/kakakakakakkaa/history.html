<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Order History</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root { --primary: #ff8fab; --primary-dark: #c9184a; --bg: #fff5f7; --border: #f0e0e5; }
    body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; }

    .container { max-width: 1000px; margin: 20px auto; padding: 0 20px; }
    .nav-tabs { display: flex; gap: 8px; background: white; padding: 8px; border-radius: 14px; margin-bottom: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .nav-link { flex: 1; text-align: center; padding: 10px; border-radius: 10px; text-decoration: none; color: #888; font-weight: 600; }
    .nav-link.active { background: var(--primary-dark); color: white; }

    .admin-card { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th, td { padding: 12px; border: 1px solid var(--border); text-align: left; }
    th { background: var(--primary); color: white; font-weight: 600; }
    td { font-weight: 500; }
    .status { padding: 5px 10px; border-radius: 5px; color: white; font-weight: 600; }
    .status.pending { background: #f0ad4e; }
    .status.completed { background: #5cb85c; }
    .status.cancelled { background: #d9534f; }
  </style>
</head>
<body>

<div class="container">
  <div class="nav-tabs">
    <a href="admin.html" class="nav-link">Home</a>
    <a href="sales.html" class="nav-link">Sales</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <a href="schedule.html" class="nav-link">Schedule</a>
    <a href="admin_menu.html" class="nav-link">Menu</a>
    <a href="history.html" class="nav-link active">History</a>
  </div>

  <div class="admin-card">
    <h2><i class="fas fa-history"></i> Order History</h2>
    
    <div style="margin:20px 0;">
      <input type="text" id="search-history" placeholder="Search by customer or product..." style="width:100%; padding:10px; border:2px solid var(--border); border-radius:10px;">
    </div>

    <table>
      <thead>
        <tr>
          <th>Order ID</th>
          <th>Customer</th>
          <th>Products</th>
          <th>Total (₱)</th>
          <th>Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="history-list">
        <tr><td colspan="6" style="text-align:center; color:#999;">Loading...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
    authDomain: "candn-bakery.firebaseapp.com",
    databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "candn-bakery"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let cachedOrders = [];

  async function loadHistory() {
    const historyRef = ref(db, 'orders');
    const snapshot = await get(historyRef);
    const tbody = document.getElementById('history-list');
    
    cachedOrders = [];
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#999;">Loading...</td></tr>';

    if(snapshot.exists()) {
      snapshot.forEach(orderSnap => {
        const order = { id: orderSnap.key, ...orderSnap.val() };
        cachedOrders.push(order);
      });
    }

    renderHistory();
  }

  function renderHistory() {
    const tbody = document.getElementById('history-list');
    const searchTerm = document.getElementById('search-history').value.toLowerCase();

    let filtered = cachedOrders.filter(o => 
      o.customer?.toLowerCase().includes(searchTerm) || 
      o.products?.some(p => p.name.toLowerCase().includes(searchTerm))
    );

    tbody.innerHTML = filtered.length ? '' : '<tr><td colspan="6" style="text-align:center; color:#999;">No orders found.</td></tr>';

    filtered.forEach(o => {
      const productsText = o.products.map(p => `${p.name} x${p.quantity}`).join(', ');
      const date = new Date(o.createdAt).toLocaleString();
      const statusClass = o.status?.toLowerCase() || 'pending';
      tbody.innerHTML += `
        <tr>
          <td>${o.id}</td>
          <td>${o.customer || '-'}</td>
          <td>${productsText}</td>
          <td>₱${Number(o.total).toFixed(2)}</td>
          <td>${date}</td>
          <td><span class="status ${statusClass}">${o.status || 'Pending'}</span></td>
        </tr>
      `;
    });
  }

  document.getElementById('search-history').addEventListener('input', renderHistory);
  loadHistory();
</script>

</body>
</html>
