<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Customize Your Cake - C&N Bakery</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  
  <style>
    /* Specific styles for the customization form */
    .cus-container { padding: 40px 0; }
    .cus-card {
      background: white;
      border-radius: 30px;
      padding: 40px;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
    }
    .form-section h2 { color: var(--primary-dark); margin-bottom: 25px; }
    .selection-group { margin-bottom: 20px; }
    .selection-group label { display: block; font-weight: 700; margin-bottom: 10px; font-size: 0.9rem; }
    select, input[type="file"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #eee;
      border-radius: 12px;
      outline: none;
      font-family: inherit;
    }
    .price-display {
      background: var(--secondary);
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin-top: 20px;
    }
    .price-display h3 { color: var(--primary-dark); font-size: 1.5rem; }
    
    .preview-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #fffafa;
      border: 2px dashed #ffc1d1;
      border-radius: 20px;
      padding: 20px;
    }
    #image-preview {
      max-width: 100%;
      max-height: 300px;
      border-radius: 15px;
      margin-top: 15px;
      display: none;
    }
    .summary-list { text-align: left; list-style: none; margin: 20px 0; }
    .summary-list li { margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; display: flex; justify-content: space-between; }
    
    @media (max-width: 768px) {
      .cus-card { grid-template-columns: 1fr; }
    }

    /* Modal Styles */
    .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; padding: 30px; border-radius: 20px; width: 90%; max-width: 500px; position: relative; }
    .close-modal { position: absolute; right: 20px; top: 15px; font-size: 24px; cursor: pointer; }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
      authDomain: "candn-bakery.firebaseapp.com",
      databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "candn-bakery",
      storageBucket: "candn-bakery.appspot.com",
      messagingSenderId: "620414447517",
      appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
    };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    onAuthStateChanged(auth, async (user) => {
      const nameTag = document.getElementById('user-name-display');
      const logoutBtn = document.getElementById('logout-trigger');
      if (user) {
        if(logoutBtn) logoutBtn.classList.remove('hidden');
        const snap = await get(ref(db, "users/" + user.uid));
        if (snap.exists() && nameTag) nameTag.innerText = "Hi, " + snap.val().name;
      } else {
        window.location.href = 'index.html';
      }
    });

    window.handleLogout = () => signOut(auth);
  </script>
</head>
<body>

  <header>
    <div class="container nav-flex">
      <div class="logo-text">C&N <span>Bakery</span></div>
      <nav>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="faq.html">FAQ</a></li> 
        </ul>
      </nav>
      <div class="auth-area">
        <div class="nav-icons">
          <i class="fas fa-shopping-cart" title="Cart" onclick="location.href='cart.html'"></i>
          <i class="fas fa-user-circle" title="Account" onclick="location.href='user.html'"></i>
        </div>
        <span id="user-name-display"></span>
        <button id="logout-trigger" class="btn-outline hidden" onclick="handleLogout()">Logout</button>
      </div>
    </div>
  </header>

  <div class="container cus-container">
    <div class="cus-card">
      <div class="form-section">
        <h2>Design Your <span>Dream Cake</span></h2>
        
        <div class="selection-group">
          <label>Number of Layers</label>
          <select id="layers" onchange="updatePrice()">
            <option value="1" data-price="500">1 Layer - ₱500</option>
            <option value="2" data-price="1200">2 Layers - ₱1,200</option>
            <option value="3" data-price="2500">3 Layers - ₱2,500</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Chiffon Flavor</label>
          <select id="flavor" onchange="updatePrice()">
            <option value="Vanilla" data-price="0">Classic Vanilla (+₱0)</option>
            <option value="Chocolate" data-price="50">Rich Chocolate (+₱50)</option>
            <option value="Red Velvet" data-price="100">Red Velvet (+₱100)</option>
            <option value="Ube" data-price="80">Ube Halaya (+₱80)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Frosting Kind</label>
          <select id="frosting" onchange="updatePrice()">
            <option value="Whipped Cream" data-price="0">Whipped Cream (+₱0)</option>
            <option value="Buttercream" data-price="100">Buttercream (+₱100)</option>
            <option value="Cream Cheese" data-price="200">Cream Cheese (+₱200)</option>
            <option value="Chocolate Ganache" data-price="150">Chocolate Ganache (+₱150)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Design Style</label>
          <select id="design" onchange="updatePrice()">
            <option value="Simple Piping" data-price="0">Simple Piping (+₱0)</option>
            <option value="Printable Topper" data-price="150">Printable Topper (+₱150)</option>
            <option value="Full Fondant Topper" data-price="450">Full Fondant Topper (+₱450)</option>
          </select>
        </div>

        <div class="selection-group">
          <label>Upload Reference (Optional)</label>
          <input type="file" id="cake-ref" accept="image/*" onchange="previewImage(event)">
        </div>

        <div class="price-display">
          <p>Estimated Total</p>
          <h3 id="total-price">₱500</h3>
        </div>

        <button class="btn-primary full-width" style="margin-top: 20px; width:100%; padding:15px; cursor:pointer;" onclick="showSummary()">Order Summary</button>
      </div>

      <div class="preview-section" id="preview-box">
        <i class="fas fa-birthday-cake" style="font-size: 3rem; color: #ffc1d1;"></i>
        <p style="margin-top: 10px; color: #888;">Your reference image will appear here</p>
        <img id="image-preview" src="" alt="Cake Reference">
      </div>
    </div>
  </div>

  <div id="summary-modal" class="modal">
    <div class="modal-content">
      <span class="close-modal" onclick="closeSummary()">×</span>
      <div class="modal-header-text">
        <h2>Order Summary</h2>
        <p>Review your custom cake details</p>
      </div>
      
      <ul class="summary-list" id="summary-details"></ul>

      <div class="price-display" style="margin-bottom: 20px;">
        <h3>Total: <span id="modal-total">₱500</span></h3>
      </div>

      <button class="btn-primary full-width" style="width:100%; padding:15px; cursor:pointer;" onclick="addToCart()">Add to Cart</button>
    </div>
  </div>

  <script>
    function updatePrice() {
      const layersPrice = parseInt(document.getElementById('layers').selectedOptions[0].dataset.price);
      const flavorPrice = parseInt(document.getElementById('flavor').selectedOptions[0].dataset.price);
      const frostingPrice = parseInt(document.getElementById('frosting').selectedOptions[0].dataset.price);
      const designPrice = parseInt(document.getElementById('design').selectedOptions[0].dataset.price);
      
      const total = layersPrice + flavorPrice + frostingPrice + designPrice;
      document.getElementById('total-price').innerText = "₱" + total.toLocaleString();
      return total;
    }

    function previewImage(event) {
      const reader = new FileReader();
      const output = document.getElementById('image-preview');
      const icon = document.querySelector('#preview-box i');
      const text = document.querySelector('#preview-box p');

      reader.onload = function() {
        output.src = reader.result;
        output.style.display = "block";
        icon.style.display = "none";
        text.style.display = "none";
      }
      if(event.target.files[0]) reader.readAsDataURL(event.target.files[0]);
    }

    function showSummary() {
      const layers = document.getElementById('layers').value;
      const flavor = document.getElementById('flavor').value;
      const frosting = document.getElementById('frosting').value;
      const design = document.getElementById('design').value;
      const total = document.getElementById('total-price').innerText;

      const summaryHTML = `
        <li><span>Layers:</span> <strong>${layers}</strong></li>
        <li><span>Flavor:</span> <strong>${flavor}</strong></li>
        <li><span>Frosting:</span> <strong>${frosting}</strong></li>
        <li><span>Design:</span> <strong>${design}</strong></li>
      `;

      document.getElementById('summary-details').innerHTML = summaryHTML;
      document.getElementById('modal-total').innerText = total;
      document.getElementById('summary-modal').classList.add('active');
    }

    function closeSummary() {
      document.getElementById('summary-modal').classList.remove('active');
    }

    function addToCart() {
      // 1. Get numeric price
      const rawPrice = document.getElementById('total-price').innerText;
      const numericPrice = parseFloat(rawPrice.replace(/[₱,]/g, ''));

      // 2. Format object to match cart.html logic
      const order = {
        name: "Customized Cake (" + document.getElementById('layers').value + " Layer)",
        price: numericPrice,
        quantity: 1,
        image: document.getElementById('image-preview').src || 'https://via.placeholder.com/120?text=Custom+Cake',
        // Optional: save custom details too
        customDetails: {
            layers: document.getElementById('layers').value,
            flavor: document.getElementById('flavor').value,
            frosting: document.getElementById('frosting').value,
            design: document.getElementById('design').value
        },
        id: Date.now()
      };

      // 3. Save to "cart" key (shared with cart.html)
      let cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push(order);
      localStorage.setItem('cart', JSON.stringify(cart));

      alert("Sweet! Your custom cake has been added to the cart.");
      window.location.href = 'cart.html';
    }

    window.onload = updatePrice;
  </script>
</body>
</html>
