<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>C&N Bakery - Admin - Manage Products</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f5f0;
      color: #333;
      margin: 0;
      padding: 20px;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      font-family: 'Pacifico', cursive;
      color: #8B4513;
      margin: 0 0 25px;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
    }
    .section {
      background: white;
      padding: 24px;
      border-radius: 10px;
      box-shadow: 0 3px 15px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }
    label {
      display: block;
      margin: 14px 0 5px;
      font-weight: 600;
      color: #5c4033;
    }
    input, textarea, select, button {
      width: 100%;
      padding: 11px;
      margin-bottom: 10px;
      border: 1px solid #d0c0b0;
      border-radius: 6px;
      box-sizing: border-box;
      font-size: 1rem;
    }
    button {
      background: #8B4513;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 1.05rem;
      padding: 12px;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) {
      background: #a0522d;
    }
    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }
    .product-item {
      padding: 14px 0;
      border-bottom: 1px solid #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }
    .product-item:last-child {
      border-bottom: none;
    }
    .product-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 6px;
      background: #f0e8e0;
    }
    h3.category-title {
      color: #8B4513;
      margin: 35px 0 12px;
      font-size: 1.4rem;
    }
    .empty {
      color: #777;
      font-style: italic;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Admin – Manage Products</h1>

    <!-- Add Product Form -->
    <div class="section">
      <h2>Add New Product</h2>
      <form id="add-product-form">
        <label>Product Name *</label>
        <input type="text" id="name" required placeholder="e.g. Chocolate Truffle Cake">

        <label>Price (₱) *</label>
        <input type="number" id="price" step="0.01" min="1" required placeholder="450.00">

        <label>Image URL *</label>
        <input type="url" id="image" required placeholder="https://example.com/cake.jpg">

        <label>Category *</label>
        <select id="category" required>
          <option value="">— Select category —</option>
          <option value="cakes">Cakes</option>
          <option value="pastries">Pastries</option>
          <option value="custom">Custom Cakes</option>
        </select>

        <label>Description (optional)</label>
        <textarea id="description" rows="3" placeholder="Brief description..."></textarea>

        <button type="submit" id="submit-btn">Add Product</button>
      </form>
    </div>

    <!-- Product List -->
    <div class="section">
      <h2>Current Products</h2>
      <div id="product-list"></div>
    </div>
  </div>

  <script>
    // Basic password check
    const password = prompt("Enter admin password:");
    if (password !== "digitaldealers") {
      alert("Access denied");
      window.location.href = "index.html";
    }
  </script>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
    import { getDatabase, ref, push, set, onValue, remove } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCWUJfDwLR5erpExZUoBWW7YJ-aDpT_zy0",
      authDomain: "candn-bakery.firebaseapp.com",
      databaseURL: "https://candn-bakery-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "candn-bakery",
      storageBucket: "candn-bakery.appspot.com",
      messagingSenderId: "620414447517",
      appId: "1:620414447517:web:d42c5d50a91ff41e5ac974"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const form = document.getElementById('add-product-form');
    const submitBtn = document.getElementById('submit-btn');
    const productListEl = document.getElementById('product-list');

    // ────────────────────────────────────────────────
    // Add product
    // ────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = "Adding...";

      const name        = document.getElementById('name').value.trim();
      const price       = parseFloat(document.getElementById('price').value);
      const image       = document.getElementById('image').value.trim();
      const category    = document.getElementById('category').value;
      const description = document.getElementById('description').value.trim();

      if (!name || isNaN(price) || price < 1 || !image || !category) {
        alert("Please complete all required fields (name, price ≥ 1, image URL, category)");
        submitBtn.disabled = false;
        submitBtn.textContent = "Add Product";
        return;
      }

      try {
        const refPath = `products/${category}`;
        const newRef = push(ref(db, refPath));
        await set(newRef, {
          name,
          price,
          image,
          description: description || "",
          createdAt: Date.now()
        });
        alert("Product added successfully!");
        form.reset();
      } catch (err) {
        console.error(err);
        alert("Failed to add product: " + err.message);
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Add Product";
      }
    });

    // ────────────────────────────────────────────────
    // Render all products
    // ────────────────────────────────────────────────
    const categories = [
      { key: 'cakes',   label: 'Cakes'        },
      { key: 'pastries', label: 'Pastries'     },
      { key: 'custom',   label: 'Custom Cakes' }
    ];

    function renderAllProducts() {
      productListEl.innerHTML = '';

      categories.forEach(({ key, label }) => {
        onValue(ref(db, `products/${key}`), (snapshot) => {
          let html = `<h3 class="category-title">${label}</h3>`;

          const data = snapshot.val();

          if (!data || Object.keys(data).length === 0) {
            html += '<p class="empty">No products in this category yet.</p>';
          } else {
            Object.entries(data).forEach(([id, p]) => {
              html += `
                <div class="product-item">
                  <div style="flex:1;">
                    <strong>${p.name}</strong><br>
                    ₱${Number(p.price).toFixed(2)}
                    ${p.description ? `<br><small>${p.description}</small>` : ''}
                  </div>
                  <div style="display:flex; align-items:center; gap:12px;">
                    <img src="${p.image}" alt="${p.name}"
                         onerror="this.src='https://via.placeholder.com/80?text=No+Image';">
                    <button onclick="deleteProduct('${key}','${id}')">Delete</button>
                  </div>
                </div>
              `;
            });
          }

          // Replace or append section for this category
          const existing = document.getElementById(`cat-${key}`);
          if (existing) {
            existing.outerHTML = `<div id="cat-${key}">${html}</div>`;
          } else {
            productListEl.innerHTML += `<div id="cat-${key}">${html}</div>`;
          }
        }, { onlyOnce: false });
      });
    }

    // Initial render
    renderAllProducts();

    // Global delete function
    window.deleteProduct = async (category, id) => {
      if (!confirm("Delete this product?")) return;
      try {
        await remove(ref(db, `products/${category}/${id}`));
        // No need to manually re-render — onValue will trigger update
      } catch (err) {
        alert("Delete failed: " + err.message);
      }
    };
  </script>

</body>
</html>
